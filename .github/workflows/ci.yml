name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx
        pip install -r backend/requirements.txt
        pip install -r data_pipeline/requirements.txt
        
    - name: Run Unit Tests
      env:
        GEMINI_API_KEY: "dummy_key"
        MONGO_URI: "mongodb://localhost:27017/dummy"
      run: |
        pytest tests/ -v
        
    - name: Lint with flake8
      run: |
        # Verifica errores críticos de sintaxis
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Avisos generales (no rompe el build)
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

    - name: Validate Backend Imports
      env:
        GEMINI_API_KEY: "dummy_key_for_test"
        MONGO_URI: "mongodb://localhost:27017/dummy"
      run: |
        cd backend
        python -c "from main import app; print('FastAPI App cargada correctamente.')"

    - name: Validate Pipeline Script
      run: |
        # Aseguramos de que el script compila sin errores
        python -m py_compile data_pipeline/pipeline_limpieza.py
        python -m py_compile start.py
