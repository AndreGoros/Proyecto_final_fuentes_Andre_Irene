# ══════════════════════════════════════════════════════════
#  railway.toml — Configuración de despliegue para Railway
#  Coloca este archivo en la RAÍZ de tu repositorio.
# ══════════════════════════════════════════════════════════

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/api/health"
intervalSeconds = 30
timeoutSeconds = 10
